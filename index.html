<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zamboni Jousting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; 
            height: 100%; height: 100dvh; 
            overflow: hidden; background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        #main-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; 
            height: 100%; height: 100dvh; 
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; z-index: 100; 
        }
        .interactive { pointer-events: auto; }
        
        #mobile-controls {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 50;
        }
        .touch-zone { position: absolute; pointer-events: auto; }
        
        #joystick-area { left: 0; top: 0; width: 50%; height: 100%; }
        
        #action-area { 
            right: 0; top: 0; width: 50%; height: 100%; 
            display: flex; justify-content: flex-end; align-items: flex-end; 
            padding: max(40px, env(safe-area-inset-bottom)) max(30px, env(safe-area-inset-right)); 
            gap: 20px;
        }
        
        .control-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 14px;
            backdrop-filter: blur(4px); transition: background 0.1s;
        }
        .control-btn.active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        #joystick-base {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        #joystick-stick {
            position: absolute; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.4); transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5); pointer-events: none;
        }

        .boost-meter-container {
            width: 150px; height: 10px; background: rgba(0,0,0,0.5);
            border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        .boost-fill { height: 100%; width: 100%; transition: width 0.1s linear, background-color 0.3s; }

        .neon-text { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
        .glass-panel { background: rgba(15, 20, 35, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        @media (max-width: 768px) {
            .desktop-hint { display: none; }
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <!-- Main Game Background 3D Canvas -->
        <div id="game-container"></div>

        <div id="ui-layer">
            
            <!-- Global Pucks Display -->
            <div id="pucks-display" class="absolute top-0 right-0 z-50 pointer-events-auto transition-opacity duration-300" style="padding-top: max(16px, env(safe-area-inset-top)); padding-right: max(16px, env(safe-area-inset-right));">
                <div class="flex items-center gap-3 glass-panel px-4 py-2 sm:py-3 rounded-xl border-b-4 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.4)]">
                    <div class="w-5 h-5 sm:w-6 sm:h-6 bg-black rounded-full border-2 border-gray-600 shadow-inner flex justify-center items-center">
                        <div class="w-2.5 h-2.5 sm:w-3 sm:h-3 bg-gray-800 rounded-full border border-gray-700"></div>
                    </div>
                    <span class="text-yellow-400 font-bold text-sm sm:text-lg tracking-wider leading-none">PUCKS:</span>
                    <span id="pucks-count" class="text-white font-black text-lg sm:text-xl leading-none">0</span>
                </div>
            </div>

            <!-- In-Game HUD -->
            <div id="hud" class="absolute top-0 left-0 w-full flex justify-between items-start hidden transition-opacity duration-500 z-10 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));">
                <div class="flex flex-col gap-2 pointer-events-auto">
                    <div id="p1-panel" class="flex items-center gap-4 glass-panel p-3 rounded-xl border-l-4 transition-all duration-300" style="border-color: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.5);">
                        <span id="p1-label" class="font-bold text-xl uppercase tracking-wider neon-text leading-none" style="color: #ef4444;">P1</span>
                        <span id="score1" class="text-white font-black text-3xl leading-none">0</span>
                    </div>
                    <div class="boost-meter-container"><div id="boost1" class="boost-fill bg-red-500"></div></div>
                </div>
                
                <div class="flex flex-col gap-2 items-end pointer-events-auto">
                    <div class="flex items-center gap-4 glass-panel p-3 rounded-xl border-r-4 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        <span id="score2" class="text-white font-black text-3xl leading-none">0</span>
                        <span class="text-blue-400 font-bold text-xl uppercase tracking-wider neon-text leading-none">P2 (AI)</span>
                    </div>
                    <div class="boost-meter-container"><div id="boost2" class="boost-fill bg-blue-500"></div></div>
                </div>
            </div>
            
            <!-- Round Messages -->
            <div id="round-message" class="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                <span id="round-text" class="text-white font-black text-5xl md:text-7xl uppercase tracking-widest text-center transform scale-150 opacity-0 transition-all duration-300 neon-text" style="color: #fff;">FIGHT!</span>
            </div>

            <!-- Main Menu (Restructured for Sliding) -->
            <div id="main-menu" class="absolute inset-0 z-20 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));">
                
                <!-- Title / Hints (Top Left) -->
                <div id="menu-left" class="absolute top-6 left-6 sm:top-10 sm:left-10 pointer-events-auto transition-transform duration-500 ease-in-out transform translate-x-0">
                    <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-purple-500 to-blue-500 mb-1 uppercase tracking-tighter" style="filter: drop-shadow(0 0 8px rgba(168,85,247,0.5));">
                        Zamboni
                    </h1>
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-6 tracking-widest uppercase neon-text" style="color: #e2e8f0;">Jousting</h2>
                    
                    <div class="text-sm text-gray-400 glass-panel p-4 rounded-2xl border border-gray-700 max-w-[220px] hidden sm:block">
                        <strong class="text-gray-200 block mb-2">Controls:</strong>
                        A/D: Drive & Turn<br>
                        W/S: Tilt Midair<br>
                        Space: Jump<br>
                        Shift: Boost
                    </div>
                </div>

                <!-- Buttons (Bottom Right) -->
                <div id="menu-right" class="absolute bottom-6 right-6 sm:bottom-10 sm:right-10 flex flex-col gap-4 items-end pointer-events-auto w-48 sm:w-64 transition-transform duration-500 ease-in-out transform translate-x-0">
                    <button onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded-xl sm:rounded-2xl text-lg sm:text-xl transition transform hover:scale-105 shadow-[0_0_20px_rgba(99,102,241,0.6)] border-b-4 border-indigo-900 cursor-pointer flex justify-between items-center">
                        <span>PLAY</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 sm:h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>

                    <button onclick="openShop()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded-xl sm:rounded-2xl text-lg sm:text-xl transition transform hover:scale-105 shadow-[0_0_20px_rgba(245,158,11,0.5)] border-b-4 border-yellow-900 cursor-pointer flex justify-between items-center">
                        <span>SHOP</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 sm:h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    </button>

                    <button onclick="openSettings()" class="w-full bg-gradient-to-r from-gray-600 to-gray-500 hover:from-gray-500 hover:to-gray-400 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded-xl sm:rounded-2xl text-lg sm:text-xl transition transform hover:scale-105 shadow-[0_0_15px_rgba(156,163,175,0.5)] border-b-4 border-gray-800 cursor-pointer flex justify-between items-center">
                        <span>SETTINGS</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 sm:w-7 sm:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    </button>
                </div>
            </div>

            <!-- Settings Menu -->
            <div id="settings-menu" class="absolute inset-0 bg-black bg-opacity-80 backdrop-blur-md z-40 hidden flex-col items-center justify-center transition-opacity duration-500 opacity-0 pointer-events-none">
                <div class="glass-panel p-8 rounded-3xl border border-gray-700 shadow-2xl text-center w-[90%] max-w-sm pointer-events-auto">
                    <h2 class="text-3xl md:text-4xl font-black text-white mb-6 uppercase tracking-wider drop-shadow-md">SETTINGS</h2>
                    <p class="text-gray-400 mb-8 italic">Settings panel coming soon...</p>
                    <button onclick="closeSettings()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-10 rounded-xl text-xl transition transform hover:scale-105 shadow-lg border-b-4 border-gray-800 cursor-pointer">
                        BACK
                    </button>
                </div>
            </div>

            <!-- Zamboni Shop (Overlay with zoom animation) -->
            <div id="shop-menu" class="absolute inset-0 z-40 hidden flex-col transition-opacity duration-500 opacity-0 pointer-events-none">
                
                <!-- Shop Header -->
                <div class="absolute top-0 left-0 w-full flex justify-start items-start z-50 pointer-events-none" style="padding: max(16px, env(safe-area-inset-top)) 0 0 max(16px, env(safe-area-inset-left));">
                    <button onclick="closeShop()" class="pointer-events-auto glass-panel px-4 sm:px-5 py-2 sm:py-3 rounded-xl border-b-4 border-gray-700 hover:bg-gray-800 text-white font-bold transition flex items-center gap-2 shadow-lg leading-none text-sm sm:text-base">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                        BACK
                    </button>
                </div>

                <!-- Action Button Top Center -->
                <div class="absolute top-24 sm:top-28 left-1/2 transform -translate-x-1/2 w-[90%] max-w-xs pointer-events-none z-20 flex justify-center">
                    <div id="shop-item-action" class="w-full pointer-events-auto shadow-2xl rounded-xl"></div>
                </div>

                <!-- Navigation Arrows -->
                <div class="absolute inset-0 flex items-center justify-between px-4 sm:px-24 pointer-events-none z-10">
                    <button onclick="prevShopItem()" class="pointer-events-auto bg-black bg-opacity-60 hover:bg-opacity-90 text-white rounded-full w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center border-2 border-gray-500 transition transform hover:scale-110 shadow-[0_0_15px_rgba(0,0,0,0.8)] cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 sm:h-8" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <button onclick="nextShopItem()" class="pointer-events-auto bg-black bg-opacity-60 hover:bg-opacity-90 text-white rounded-full w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center border-2 border-gray-500 transition transform hover:scale-110 shadow-[0_0_15px_rgba(0,0,0,0.8)] cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 sm:h-8" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <!-- Info Card Bottom Center -->
                <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-lg pointer-events-none z-20 flex flex-col items-center">
                    <h2 id="shop-item-name" class="text-4xl sm:text-5xl font-black uppercase text-center drop-shadow-[0_4px_4px_rgba(0,0,0,1)] mb-2">NAME</h2>
                    <p id="shop-item-desc" class="text-gray-200 font-medium italic text-base sm:text-lg leading-relaxed text-center drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] w-full">Desc</p>
                </div>

            </div>

            <!-- Game Over Screen -->
            <div id="game-over" class="interactive flex-1 flex flex-col justify-center items-center bg-black bg-opacity-80 backdrop-blur-md z-30 hidden absolute inset-0 transition-opacity duration-300">
                <div class="glass-panel p-10 rounded-3xl flex flex-col items-center text-center shadow-2xl">
                    <h1 id="winner-text" class="text-5xl md:text-7xl font-black text-white mb-4 tracking-wider uppercase drop-shadow-[0_0_20px_currentColor]">RED WINS!</h1>
                    <p id="reward-text" class="text-yellow-400 font-bold text-2xl mb-8 hidden">+5 PUCKS EARNED!</p>
                    
                    <button onclick="returnToMenu()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-10 rounded-xl text-xl transition transform hover:scale-105 shadow-lg border-b-4 border-gray-800 cursor-pointer">
                        Main Menu
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-controls">
            <div id="joystick-area" class="touch-zone">
                <div id="joystick-base"><div id="joystick-stick"></div></div>
            </div>
            <div id="action-area" class="touch-zone">
                <div id="btn-boost" class="control-btn" style="box-shadow: 0 0 15px rgba(239,68,68,0.5); border-color: #ef4444;">BOOST</div>
                <div id="btn-jump" class="control-btn" style="box-shadow: 0 0 15px rgba(59,130,246,0.5); border-color: #3b82f6;">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // --- 1. GAME CONSTANTS & STATE ---
        const GAME = {
            state: 'MENU', // MENU, SHOP, SETTINGS, PLAYING, ROUND_OVER, GAME_OVER
            width: window.innerWidth,
            height: window.innerHeight,
            maxScore: 5,
            arena: { width: 40, height: 25 },
            gravity: 0.014, // Slightly higher for punchier jumps
            dt: 1,
            testingMode: false
        };

        const INPUT = { 
            left: false, right: false, jump: false, up: false, down: false, boost: false,
            joyX: 0, joyY: 0, joyActive: false 
        };

        const UI = {
            wrapper: document.getElementById('main-wrapper'),
            menu: document.getElementById('main-menu'),
            shop: document.getElementById('shop-menu'),
            settings: document.getElementById('settings-menu'),
            hud: document.getElementById('hud'),
            gameOver: document.getElementById('game-over'),
            pucksDisplay: document.getElementById('pucks-display'),
            pucksCount: document.getElementById('pucks-count'),
            score1: document.getElementById('score1'),
            score2: document.getElementById('score2'),
            p1Panel: document.getElementById('p1-panel'),
            p1Label: document.getElementById('p1-label'),
            boost1: document.getElementById('boost1'),
            boost2: document.getElementById('boost2'),
            msgContainer: document.getElementById('round-message'),
            msgText: document.getElementById('round-text'),
            winnerText: document.getElementById('winner-text'),
            rewardText: document.getElementById('reward-text'),
            mobileControls: document.getElementById('mobile-controls')
        };

        const isMobileDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 768);

        // Track the current round sequence to prevent overlapping countdowns
        let currentRoundId = 0;

        // --- 1.5 PLAYER DATA & SHOP SYSTEM ---
        const PLAYER_DATA = {
            pucks: 0,
            owned: ['Broker'],
            selected: 'Broker'
        };

        const SHOP_ITEMS = [
            { id: 'Broker', name: 'Broker', cost: 0, color: '#ef4444', desc: 'Looks like you got leftovers. NO! I wasn’t talking to you Zach.' },
            { id: 'Biff', name: 'Biff', cost: 15, color: '#f59e0b', desc: 'He likes to biff people. Keep him away from the hockey pucks though.' },
            { id: 'Charlie', name: 'Charlie', cost: 50, color: '#10b981', desc: 'Looks like the rich kid is cooking up a victory. No, he’s not cooking bacon Zach.' }
        ];

        let currentShopIndex = 0;

        // Shared Camera Interpolation vectors
        const currentLookAt = new THREE.Vector3(0, 4, 0);
        const targetLookAt = new THREE.Vector3(0, 4, 0);

        function getSelectedCarColor() {
            const item = SHOP_ITEMS.find(i => i.id === PLAYER_DATA.selected);
            return item ? item.color : '#ef4444';
        }

        function updateShopUI() {
            UI.pucksCount.innerText = PLAYER_DATA.pucks;
            
            const item = SHOP_ITEMS[currentShopIndex];
            
            document.getElementById('shop-item-name').innerText = item.name;
            document.getElementById('shop-item-name').style.color = item.color;
            document.getElementById('shop-item-desc').innerText = item.desc;
            
            const isOwned = PLAYER_DATA.owned.includes(item.id);
            const isSelected = PLAYER_DATA.selected === item.id;
            const canAfford = PLAYER_DATA.pucks >= item.cost;
            
            const actionContainer = document.getElementById('shop-item-action');
            if (isSelected) {
                actionContainer.innerHTML = `<button class="w-full bg-green-600 text-white font-bold py-2 sm:py-4 rounded-xl cursor-default border-b-4 border-green-800 shadow-[0_0_15px_rgba(22,163,74,0.5)] text-sm sm:text-xl">EQUIPPED</button>`;
            } else if (isOwned) {
                actionContainer.innerHTML = `<button onclick="selectCar('${item.id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 sm:py-4 rounded-xl transition transform hover:scale-105 border-b-4 border-blue-800 cursor-pointer shadow-lg text-sm sm:text-xl">EQUIP ZAMBONI</button>`;
            } else if (canAfford) {
                actionContainer.innerHTML = `<button onclick="buyCar('${item.id}')" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-2 sm:py-4 rounded-xl transition transform hover:scale-105 border-b-4 border-yellow-700 cursor-pointer shadow-[0_0_15px_rgba(234,179,8,0.5)] text-sm sm:text-xl">BUY (${item.cost} PUCKS)</button>`;
            } else {
                actionContainer.innerHTML = `<button class="w-full bg-gray-700 text-gray-500 font-bold py-2 sm:py-4 rounded-xl cursor-not-allowed border-b-4 border-gray-900 text-sm sm:text-xl">LOCKED (${item.cost} PUCKS)</button>`;
            }
        }

        function prevShopItem() {
            currentShopIndex = (currentShopIndex - 1 + SHOP_ITEMS.length) % SHOP_ITEMS.length;
            updateShopUI();
            setupShopCar();
        }

        function nextShopItem() {
            currentShopIndex = (currentShopIndex + 1) % SHOP_ITEMS.length;
            updateShopUI();
            setupShopCar();
        }

        function openShop() {
            GAME.state = 'SHOP';
            currentShopIndex = SHOP_ITEMS.findIndex(i => i.id === PLAYER_DATA.selected);
            if(currentShopIndex === -1) currentShopIndex = 0;
            
            // Slide out menu
            document.getElementById('menu-left').classList.replace('translate-x-0', '-translate-x-[150%]');
            document.getElementById('menu-right').classList.replace('translate-x-0', 'translate-x-[150%]');
            
            UI.shop.classList.remove('hidden');
            UI.shop.classList.add('flex');
            setTimeout(() => {
                UI.shop.classList.replace('opacity-0', 'opacity-100');
                UI.shop.classList.add('pointer-events-auto');
            }, 50);
            
            updateShopUI();
            setupShopCar();
        }

        function closeShop() {
            GAME.state = 'MENU';
            
            UI.shop.classList.replace('opacity-100', 'opacity-0');
            UI.shop.classList.remove('pointer-events-auto');
            
            setTimeout(() => {
                UI.shop.classList.add('hidden');

        function createIceTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048; canvas.height = 512;  
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#dae8f5'; 
            ctx.fillRect(0, 0, 2048, 512);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            for(let i=0; i<1500; i++) {
                ctx.beginPath();
                let x = Math.random() * 2048; let y = Math.random() * 512;
                ctx.moveTo(x, y); ctx.lineTo(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*30);
                ctx.stroke();
            }

            const cX = 1024; const cY = 256;

            ctx.lineWidth = 12; ctx.strokeStyle = '#d02020';
            ctx.beginPath(); ctx.moveTo(cX, 0); ctx.lineTo(cX, 512); ctx.stroke();

            ctx.beginPath(); ctx.arc(cX, cY, 150, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#d02020';
            ctx.beginPath(); ctx.arc(cX, cY, 15, 0, Math.PI*2); ctx.fill();

            ctx.strokeStyle = '#2040d0';
            ctx.beginPath(); ctx.moveTo(cX - 300, 0); ctx.lineTo(cX - 300, 512); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cX + 300, 0); ctx.lineTo(cX + 300, 512); ctx.stroke();

            ctx.fillStyle = 'rgba(32, 64, 208, 0.3)'; ctx.strokeStyle = '#d02020'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, cY, 120, -Math.PI/2, Math.PI/2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(2048, cY, 120, Math.PI/2, -Math.PI/2); ctx.fill(); ctx.stroke();

            const drawCircle = (x, y) => {
                ctx.beginPath(); ctx.arc(x, y, 100, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = '#d02020';
                ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
            };
            drawCircle(cX - 650, cY - 130); drawCircle(cX - 650, cY + 130);
            drawCircle(cX + 650, cY - 130); drawCircle(cX + 650, cY + 130);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        // --- 4. PARTICLE SYSTEM ---
        const particles = [];
        const particleGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        
        function spawnParticles(x, y, colorHexStr, count, speed = 1, life = 40) {
            const mat = new THREE.MeshBasicMaterial({ color: colorHexStr });
            for(let i=0; i<count; i++) {
                const mesh = new THREE.Mesh(particleGeo, mat);
                mesh.position.set(x + (Math.random()-0.5), y + (Math.random()-0.5), 0);
                scene.add(mesh); // Main scene only
                particles.push({
                    mesh: mesh, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed,
                    vz: (Math.random() - 0.5) * speed * 0.5, life: life, maxLife: life
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
                p.mesh.rotation.x += p.vx; p.mesh.rotation.y += p.vy;
                p.life--; p.mesh.scale.setScalar(p.life / p.maxLife);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        // --- 5. ENTITY CLASSES ---
        class Zamboni {
            constructor(isP1, colorHexStr, targetScene = scene) {
                this.isP1 = isP1;
                this.color = colorHexStr; 
                this.targetScene = targetScene; 
                
                this.facingLeft = !isP1; 
                this.visualRotY = isP1 ? 0 : Math.PI; 
                
                this.angle = 0; 
                this.angularVel = 0;

                this.pos = new THREE.Vector2(isP1 ? -15 : 15, 1.25);
                this.vel = new THREE.Vector2(0, 0);
                
                this.isGrounded = true;
                this.boostFuel = 100;
                this.boostOverheated = false;
                this.boostDelay = 0;
                this.score = 0;
                
                this.accel = 0.06; // Snappier start
                this.airAccel = 0.015;
                this.jumpForce = 0.48; // Compensates for slightly higher gravity
                this.boostForce = 0.045; // Punchier boost
                
                this.buildMesh();
            }

            buildMesh() {
                this.yawGroup = new THREE.Group(); 
                this.pitchGroup = new THREE.Group(); 
                this.yawGroup.add(this.pitchGroup);
                
                const bodyMat = new THREE.MeshStandardMaterial({ color: this.color, roughness: 0.3, metalness: 0.5 });
                const darkMat = new THREE.MeshStandardMaterial({ color: '#111111', roughness: 0.9 }); 
                const glowMat = new THREE.MeshBasicMaterial({ color: this.color }); 
                const metalMat = new THREE.MeshStandardMaterial({ color: '#cccccc', roughness: 0.2, metalness: 0.9 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.5, 2), bodyMat);
                body.position.y = 0; this.pitchGroup.add(body);

                const tank = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 1.8), bodyMat);
                tank.position.set(-0.3, 1.35, 0); this.pitchGroup.add(tank);

                const seat = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1.6), darkMat);
                seat.position.set(-1.2, 1.25, 0); this.pitchGroup.add(seat);

                const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
                wheelGeo.rotateX(Math.PI / 2);
                [[-1.2, -0.75, 1.1], [1.2, -0.75, 1.1], [-1.2, -0.75, -1.1], [1.2, -0.75, -1.1]].forEach(pos => {
                    const w = new THREE.Mesh(wheelGeo, darkMat); w.position.set(...pos); this.pitchGroup.add(w);
                });

                const cond = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 2.4), darkMat);
                cond.position.set(-2, -1.0, 0); this.pitchGroup.add(cond);

                const lanceGroup = new THREE.Group();
                lanceGroup.position.set(1.75, 0, 0);
                
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4), metalMat);
                pole.rotation.z = -Math.PI / 2; pole.position.x = 2; lanceGroup.add(pole);
                
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1, 8), glowMat);
                tip.rotation.z = -Math.PI / 2; tip.position.x = 4.5; lanceGroup.add(tip);

                this.lanceLength = 6.25; 
                this.pitchGroup.add(lanceGroup);
                
                const lightFront = new THREE.PointLight(this.color, 1.2, 15);
                lightFront.position.set(0, 1, 2.5); this.pitchGroup.add(lightFront);

                const lightBack = new THREE.PointLight(this.color, 1.2, 15);
                lightBack.position.set(0, 1, -2.5); this.pitchGroup.add(lightBack);

                this.targetScene.add(this.yawGroup);
            }

            reset() {
                this.pos.set(this.isP1 ? -15 : 15, 1.25);
                this.vel.set(0, 0);
                this.facingLeft = !this.isP1;
                this.visualRotY = this.isP1 ? 0 : Math.PI;
                this.angle = 0;
                this.angularVel = 0;
                this.boostFuel = 100;
                this.boostOverheated = false;
                this.boostDelay = 0;
                this.updateMesh();
            }

            getLanceTip() {
                const cosA = Math.cos(this.angle); 
                const sinA = Math.sin(this.angle);
                const dirX = this.facingLeft ? -1 : 1;
                return new THREE.Vector2(
                    this.pos.x + dirX * this.lanceLength * cosA, 
                    this.pos.y + this.lanceLength * sinA
                );
            }

            update(inputLeft, inputRight, inputJump, inputUp, inputDown, inputBoost, joyX, joyY, joyActive) {
                // Let physics fall naturally even during round transitions!
                if (GAME.state === 'MENU' || GAME.state === 'SHOP') return;
                
                // But block all control inputs during the countdown freeze
                if (GAME.state === 'ROUND_OVER') {
                    inputLeft = false; inputRight = false; inputJump = false; inputUp = false; inputDown = false; inputBoost = false;
                    joyActive = false; joyX = 0; joyY = 0;
                }

                // Aiming Logic (Joystick / Keyboard)
                if (joyActive) {
                    if (joyX < -10) this.facingLeft = true;
                    else if (joyX > 10) this.facingLeft = false;
                } else {
                    if (inputLeft) this.facingLeft = true;
                    else if (inputRight) this.facingLeft = false;
                }

                // Smooth Y-axis turnaround
                const targetRotY = this.facingLeft ? Math.PI : 0;
                let diffY = targetRotY - this.visualRotY;
                while(diffY < -Math.PI) diffY += Math.PI*2;
                while(diffY > Math.PI) diffY -= Math.PI*2;
                this.visualRotY += diffY * 0.25; 

                let driveInput = 0;
                if (inputLeft) driveInput -= 1;
                if (inputRight) driveInput += 1;

                if (this.isGrounded) {
                    this.vel.x += driveInput * this.accel;
                    this.vel.x *= 0.88; // Snappier ground friction (was 0.92)
                    
                    const visualUpDot = Math.cos(this.angle);
                    let targetFlat = visualUpDot > 0 ? 0 : Math.PI;
                    let diffFlat = targetFlat - this.angle;
                    while(diffFlat > Math.PI) diffFlat -= Math.PI*2;
                    while(diffFlat < -Math.PI) diffFlat += Math.PI*2;
                    this.angle += diffFlat * 0.25; 
                    this.angularVel = 0;
                    
                    if (inputJump) {
                        this.vel.y = this.jumpForce; this.isGrounded = false;
                        spawnParticles(this.pos.x, 0, '#cceeff', 10, 0.2, 20); 
                    }
                } else {
                    // Airborne Rotation
                    if (joyActive && Math.hypot(joyX, joyY) > 10) {
                        let joyAngle = Math.atan2(-joyY, joyX); 
                        let targetPitch = this.facingLeft ? (Math.PI - joyAngle) : joyAngle;
                        
                        let diffPitch = targetPitch - this.angle;
                        while(diffPitch > Math.PI) diffPitch -= Math.PI*2;
                        while(diffPitch < -Math.PI) diffPitch += Math.PI*2;

                        this.angle += diffPitch * 0.25; 
                        this.angularVel = 0; 
                    } else if (!joyActive) {
                        // Keyboard: W (Up) rotates up, S (Down) rotates down
                        if (inputUp) this.angularVel += 0.015;
                        if (inputDown) this.angularVel -= 0.015;
                        this.angle += this.angularVel;
                        this.angularVel *= 0.90;
                    }
                    
                    this.vel.x += driveInput * this.airAccel;
                }

                // APPLY GRAVITY TO Y VELOCITY
                this.vel.y -= GAME.gravity;

                // --- BOOST LOGIC (Cleaning Ice to Recharge) ---
                const visualUpDot = Math.cos(this.angle);

                if (inputBoost && this.boostFuel > 0 && !this.boostOverheated) {
                    this.boostFuel -= 1.5; 
                    this.boostDelay = 30;  
                    
                    const cosA = Math.cos(this.angle); const sinA = Math.sin(this.angle);
                    const dirX = this.facingLeft ? -1 : 1;
                    
                    this.vel.x += dirX * cosA * this.boostForce; 
                    this.vel.y += sinA * this.boostForce;
                    
                    if (Math.random() < 0.6) {
                        spawnParticles(this.pos.x - dirX * cosA * 2, this.pos.y - sinA * 2, this.color, 2, 0.4, 15);
                    }

                    if (this.boostFuel <= 0) {
                        this.boostFuel = 0;
                        this.boostOverheated = true; 
                    }
                } else {
                    if (this.isGrounded && visualUpDot > 0.5) {
                        if (this.boostDelay > 0) {
                            this.boostDelay--;
                        } else if (this.boostFuel < 100) {
                            if (Math.abs(this.vel.x) > 0.05) {
                                this.boostFuel += 1.5;
                                if (Math.random() < 0.2) {
                                    const dirX = this.facingLeft ? 1 : -1;
                                    spawnParticles(this.pos.x + dirX * 2, 0, '#ffffff', 1, 0.1, 10);
                                }
                            } else {
                                this.boostFuel += 0.5;
                            }
                            if (this.boostFuel >= 100) {
                                this.boostFuel = 100;
                                this.boostOverheated = false; 
                            }
                        }
                    }
                }

                this.pos.add(this.vel);

                // --- SPEAR COLLISION (Snap Flat, No Bounce) ---
                const tip = this.getLanceTip();
                if (tip.y < 0) {
                    let targetFlat = (Math.abs(this.angle) > Math.PI/2) ? Math.PI * Math.sign(this.angle) : 0;
                    let diffFlat = targetFlat - this.angle;
                    while(diffFlat > Math.PI) diffFlat -= Math.PI*2;
                    while(diffFlat < -Math.PI) diffFlat += Math.PI*2;
                    
                    this.angle += diffFlat * 0.4; 
                    this.angularVel = 0;

                    if (this.vel.y > 0) this.vel.y *= 0.5; 
                    this.vel.x *= 0.8; 

                    if (Math.random() < 0.5) {
                        spawnParticles(tip.x, 0, '#ffffff', 5, 0.5, 20);
                    }
                }

                // --- STANDARD BODY COLLISION ---
                let currentRadius = 1.60 - (visualUpDot * 0.35); 
                
                if (this.pos.y <= currentRadius + 0.001) { 
                    this.pos.y = currentRadius; 
                    if (this.vel.y < 0) this.vel.y = 0; 
                    if (visualUpDot < 0) this.vel.x *= 0.85; 
                    this.isGrounded = true; 
                } 
                else { this.isGrounded = false; }
                
                if (this.pos.y > GAME.arena.height) { this.pos.y = GAME.arena.height; this.vel.y *= -0.5; }
                if (this.pos.x < -GAME.arena.width + 2) { this.pos.x = -GAME.arena.width + 2; this.vel.x *= -0.5; }
                if (this.pos.x > GAME.arena.width - 2) { this.pos.x = GAME.arena.width - 2; this.vel.x *= -0.5; }

                while(this.angle > Math.PI) this.angle -= Math.PI*2;
                while(this.angle < -Math.PI) this.angle += Math.PI*2;
                this.updateMesh();
            }

            updateMesh() {
                this.yawGroup.position.x = this.pos.x;
                this.yawGroup.position.y = this.pos.y;
                this.yawGroup.rotation.y = this.visualRotY;
                this.pitchGroup.rotation.z = this.angle;
            }
        }

        let p1, p2;

        function runAI(ai, opponent) {
            let left = false, right = false, jump = false, up = false, down = false, boost = false;
            let joyActive = false, joyX = 0, joyY = 0;

            if (!GAME.testingMode) {
                const dx = opponent.pos.x - ai.pos.x; 
                const dy = opponent.pos.y - ai.pos.y;
                const dist = Math.hypot(dx, dy);

                if (ai.isGrounded) {
                    if (dx > 2) right = true; else if (dx < -2) left = true;
                    
                    // Chase airborne players more aggressively
                    if (opponent.pos.y > 4 && dist < 15 && Math.random() < 0.08) jump = true;
                    // Jump much more frequently in close quarters, even if player is grounded
                    if (dist < 12 && Math.random() < 0.05) jump = true;
                    // Randomly jump for unpredictability
                    if (Math.random() < 0.008) jump = true;
                } else {
                    joyActive = true;
                    joyX = dx;
                    joyY = -dy; 
                    if (dx < -2) left = true; else if (dx > 2) right = true;
                    
                    let targetAngle = Math.atan2(dy, dx);
                    let lanceAngle = ai.facingLeft ? (Math.PI - ai.angle) : ai.angle;
                    
                    let angleDiff = targetAngle - lanceAngle;
                    while(angleDiff > Math.PI) angleDiff -= Math.PI*2;
                    while(angleDiff < -Math.PI) angleDiff += Math.PI*2;

                    if (Math.abs(angleDiff) < 0.5 && dist > 5 && ai.boostFuel > 20) boost = true;
                }
            }
            
            // AI obeys countdown rule too
            if (GAME.state === 'ROUND_OVER' || GAME.testingMode) {
                left = right = jump = up = down = boost = joyActive = false;
            }
            
            ai.update(left, right, jump, up, down, boost, joyX, joyY, joyActive);
        }

        // --- 6. GAME LOGIC & COUNTDOWN ---

        function setupMenuCars() {
            if(p1) { scene.remove(p1.yawGroup); scene.remove(p2.yawGroup); p1=null; p2=null; }

            p2.updateMesh();
        }

        function setupShopCar() {

            if(p1) { scene.remove(p1.yawGroup); p1=null; }
            const item = SHOP_ITEMS[currentShopIndex];
            
            p1 = new Zamboni(true, item.color, scene);
            p1.pos.set(-6, 1.25); // Remains in P1's native position!
            p1.updateMesh();
        }

        function startGame() {
            if (isMobileDevice) { requestFullscreenAndLock(); }

            if(p1) { scene.remove(p1.yawGroup); }
            if(p2) { scene.remove(p2.yawGroup); }
            
            // Slide out menu instantly
            document.getElementById('menu-left').classList.replace('translate-x-0', '-translate-x-[150%]');
            document.getElementById('menu-right').classList.replace('translate-x-0', 'translate-x-[150%]');
            
            p1 = new Zamboni(true, getSelectedCarColor(), scene); 
            p2 = new Zamboni(false, '#3b82f6', scene);

            p1.reset(); p2.reset();
            GAME.state = 'ROUND_OVER'; 
            p1.score = 0; p2.score = 0;
            
            UI.pucksDisplay.classList.add('hidden');
            UI.menu.classList.add('hidden');
            UI.gameOver.classList.add('hidden');
            UI.hud.classList.remove('hidden');

            updateHUD();

            if (isMobileDevice) { UI.mobileControls.style.display = 'block'; }
            
            // Kick off countdown with no initial message delay
            triggerRoundEnd(null);
        }

        async function triggerRoundEnd(msgText) {
            let activeRound = ++currentRoundId;
            GAME.state = 'ROUND_OVER'; // Freezes inputs & physics, leaves models frozen in air!
            
            // Show score message and pause so players see the hit
            if (msgText) {
                UI.msgText.innerText = msgText; 
                UI.msgText.style.color = '#fff';
                UI.msgText.style.opacity = 1; 
                UI.msgText.style.transform = "scale(1)";
                
                await sleep(1500); // Dramatic freeze frame
                if (activeRound !== currentRoundId) return; // Exit if another game started
                
                UI.msgText.style.opacity = 0; 
                UI.msgText.style.transform = "scale(1.5)";
                await sleep(300);
            }
            
            if (activeRound !== currentRoundId) return;
            
            // Reset to starting line
            p1.reset(); p2.reset();
            particles.forEach(p => scene.remove(p.mesh)); particles.length = 0;

            const animateText = async (text, color = '#fff') => {
                if (activeRound !== currentRoundId) return;
                UI.msgText.innerText = text;
                UI.msgText.style.color = color;
                UI.msgText.style.opacity = 1;
                UI.msgText.style.transform = "scale(1)";
                await sleep(700);
                
                if (activeRound !== currentRoundId) return;
                UI.msgText.style.opacity = 0;
                UI.msgText.style.transform = "scale(1.5)";
                await sleep(300);
            };

            // Racing countdown!
            await animateText("3", "#ef4444"); // Red
            await animateText("2", "#f59e0b"); // Yellow
            await animateText("1", "#10b981"); // Green
            
            if (activeRound !== currentRoundId) return;
            
            // Unfreeze inputs!
            UI.msgText.innerText = "FIGHT!";
            UI.msgText.style.color = "#fff";
            UI.msgText.style.opacity = 1;
            UI.msgText.style.transform = "scale(1)";
            
            GAME.state = 'PLAYING';
            
            await sleep(1000);
            if (activeRound !== currentRoundId) return;
            UI.msgText.style.opacity = 0;
            UI.msgText.style.transform = "scale(1.5)";
        }

        function endGame(winnerName, colorHexStr) {
            currentRoundId++; // Cancels any running countdowns immediately
            GAME.state = 'GAME_OVER';
            UI.winnerText.innerText = `${winnerName} WINS!`; 
            UI.winnerText.style.color = colorHexStr;
            
            if (winnerName === "PLAYER 1") {
                PLAYER_DATA.pucks += 5;
                updateShopUI(); 
                UI.rewardText.classList.remove('hidden');
            } else {
                UI.rewardText.classList.add('hidden');
            }

            UI.gameOver.classList.remove('hidden'); 
            UI.mobileControls.style.display = 'none';
        }

        function returnToMenu() {
            currentRoundId++; // Cancel countdowns
            GAME.state = 'MENU';
            UI.gameOver.classList.add('hidden'); 
            UI.hud.classList.add('hidden'); 
            UI.menu.classList.remove('hidden');
            UI.pucksDisplay.classList.remove('hidden');
            UI.mobileControls.style.display = 'none';
            
            // Slide in menu
            document.getElementById('menu-left').classList.replace('-translate-x-[150%]', 'translate-x-0');
            document.getElementById('menu-right').classList.replace('translate-x-[150%]', 'translate-x-0');
            
            setupMenuCars();
        }

        function updateHUD() {
            UI.score1.innerText = p1.score; UI.score2.innerText = p2.score;
            
            UI.p1Label.style.color = p1.color;
            UI.p1Panel.style.borderColor = p1.color;
            UI.p1Panel.style.boxShadow = `0 0 15px ${p1.color}80`; 
            UI.boost1.style.backgroundColor = p1.boostOverheated ? '#6b7280' : p1.color;
            
            UI.boost1.style.width = `${p1.boostFuel}%`; 
            UI.boost2.style.width = `${p2.boostFuel}%`;
            UI.boost2.style.backgroundColor = p2.boostOverheated ? '#6b7280' : '#3b82f6';
        }

        function checkCollisions() {
            if (GAME.state !== 'PLAYING') return;
            const t1 = p1.getLanceTip(); const t2 = p2.getLanceTip();

            if (t1.distanceTo(t2) < 1.5) {
                p1.vel.x = -(p1.facingLeft ? -1 : 1) * Math.cos(p1.angle) * 0.5; 
                p1.vel.y = -Math.sin(p1.angle) * 0.5;
                p2.vel.x = -(p2.facingLeft ? -1 : 1) * Math.cos(p2.angle) * 0.5; 
                p2.vel.y = -Math.sin(p2.angle) * 0.5;
                spawnParticles((t1.x+t2.x)/2, (t1.y+t2.y)/2, '#ffffff', 20, 0.8);
                
                // Shake camera
                camera.position.x += (Math.random() - 0.5) * 1.5; 
                camera.position.y += (Math.random() - 0.5) * 1.5;
                return;
            }

            const c1 = p1.pos.clone(); const c2 = p2.pos.clone();
            const hit1 = t1.distanceTo(c2) < 2.0; const hit2 = t2.distanceTo(c1) < 2.0;

            if (hit1 && hit2) {
                spawnParticles(c1.x, c1.y, p1.color, 30, 1.0); spawnParticles(c2.x, c2.y, p2.color, 30, 1.0);
                triggerRoundEnd("DRAW!");
            } else if (hit1) {
                spawnParticles(c2.x, c2.y, p2.color, 40, 1.2); p1.score++;
                if (p1.score >= GAME.maxScore) endGame("PLAYER 1", p1.color); else triggerRoundEnd("P1 SCORES!");
            } else if (hit2) {
                spawnParticles(c1.x, c1.y, p1.color, 40, 1.2); p2.score++;
                if (p2.score >= GAME.maxScore) endGame("AI", "#3b82f6"); else triggerRoundEnd("P2 SCORES!");
            }

            if (!hit1 && !hit2 && c1.distanceTo(c2) < 3.5) {
                const push = (p1.pos.x - p2.pos.x) > 0 ? 0.2 : -0.2;
                p1.vel.x += push; p2.vel.x -= push;
                spawnParticles((c1.x+c2.x)/2, (c1.y+c2.y)/2, '#aaaaaa', 5, 0.3);
            }
        }

        // --- 7. INPUT HANDLING ---

        // Prevent Spacebar scrolling bug on PC!
        window.addEventListener('keydown', e => {
            if (['Space', 'KeyW', 'KeyS', 'KeyA', 'KeyD', 'ShiftLeft', 'ShiftRight'].includes(e.code)) {
                e.preventDefault();
            }
            if (e.code === 'Digit0') {
                GAME.testingMode = !GAME.testingMode;
            }
            if (e.code === 'KeyA') INPUT.left = true; 
            if (e.code === 'KeyD') INPUT.right = true;
            if (e.code === 'Space') INPUT.jump = true; 
            if (e.code === 'KeyW') INPUT.up = true; 
            if (e.code === 'KeyS') INPUT.down = true; 
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') INPUT.boost = true;
        }, {passive: false});

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyA') INPUT.left = false; 
            if (e.code === 'KeyD') INPUT.right = false;
            if (e.code === 'Space') INPUT.jump = false; 
            if (e.code === 'KeyW') INPUT.up = false; 
            if (e.code === 'KeyS') INPUT.down = false; 
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') INPUT.boost = false;
        });

        function getMappedTouch(touch) {
            if (!isRotated) return { clientX: touch.clientX, clientY: touch.clientY, identifier: touch.identifier };
            return { clientX: touch.clientY, clientY: physicalW - touch.clientX, identifier: touch.identifier };
        }

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const joyArea = document.getElementById('joystick-area');
        
        let joyActive = false; 
        let joyOrigin = {x: 0, y: 0};
        let joyTouchId = null;

        joyArea.addEventListener('touchstart', e => {
            e.preventDefault();
            if (joyActive) return; 
            
            const touch = getMappedTouch(e.changedTouches[0]);
            joyTouchId = touch.identifier;
            joyActive = true; 
            joyOrigin.x = touch.clientX; joyOrigin.y = touch.clientY;
            
            joyBase.style.display = 'block';
            joyBase.style.left = touch.clientX + 'px'; joyBase.style.top = touch.clientY + 'px';
            joyStick.style.left = '50%'; joyStick.style.top = '50%';
            joyStick.style.transform = `translate(-50%, -50%)`;
            
            INPUT.joyActive = true;
            INPUT.joyX = 0; INPUT.joyY = 0;
        });

        joyArea.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!joyActive) return;
            
            let touch = null;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) {
                    touch = getMappedTouch(e.changedTouches[i]); break;
                }
            }
            if(!touch) return; 

            const dx = touch.clientX - joyOrigin.x; const dy = touch.clientY - joyOrigin.y;
            const maxR = 40; const dist = Math.hypot(dx, dy);
            let nx = dx, ny = dy;
            
            if (dist > maxR) { nx = (dx / dist) * maxR; ny = (dy / dist) * maxR; }
            
            joyStick.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
            
            INPUT.joyX = dx; INPUT.joyY = dy;
            INPUT.left = dx < -20; INPUT.right = dx > 20;
        });

        function endJoy(e) { 
            if (!joyActive) return;
            let trackedTouchLifted = false;
            for(let i=0; i < e.changedTouches.length; i++) {
                if(e.changedTouches[i].identifier === joyTouchId) {
                    trackedTouchLifted = true; break;
                }
            }
            if (!trackedTouchLifted) return;

            e.preventDefault(); 
            joyActive = false; joyTouchId = null;
            joyBase.style.display = 'none'; 
            INPUT.left = false; INPUT.right = false; 
            INPUT.joyActive = false; INPUT.joyX = 0; INPUT.joyY = 0;
        }
        
        joyArea.addEventListener('touchend', endJoy); joyArea.addEventListener('touchcancel', endJoy);

        const btnJump = document.getElementById('btn-jump'); const btnBoost = document.getElementById('btn-boost');
        function bindBtn(el, actionName) {
            el.addEventListener('touchstart', (e) => { e.preventDefault(); INPUT[actionName] = true; el.classList.add('active'); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); INPUT[actionName] = false; el.classList.remove('active'); });
            el.addEventListener('touchcancel', (e) => { e.preventDefault(); INPUT[actionName] = false; el.classList.remove('active'); });
        }
        bindBtn(btnJump, 'jump'); bindBtn(btnBoost, 'boost');

        // --- 8. MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (GAME.state === 'MENU' || GAME.state === 'SETTINGS') {
                if (p1 && p2) {
                    p1.visualRotY += 0.02;
                    p2.visualRotY -= 0.02;
                    p1.updateMesh(); p2.updateMesh();
                }
                
                // Target generic menu view
                camera.position.lerp(new THREE.Vector3(0, 16, 60), 0.05);
                targetLookAt.set(0, 8, 0);
            }
            else if (GAME.state === 'SHOP') {
                // Background cars keep spinning!
                if (p1 && p2) {
                    p1.visualRotY += 0.02;
                    p2.visualRotY -= 0.02;
                    p1.updateMesh(); p2.updateMesh();
                }
                
                // Zoom in deeply on P1!
                const isMobile = GAME.width < 768;
                camera.position.lerp(new THREE.Vector3(-6, 5, isMobile ? 35 : 25), 0.05);
                targetLookAt.set(-6, 2.5, 0);
            }
            else if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER') {
                // If ROUND_OVER, inputs are blocked, but we still render the current frozen position
                p1.update(INPUT.left, INPUT.right, INPUT.jump, INPUT.up, INPUT.down, INPUT.boost, INPUT.joyX, INPUT.joyY, INPUT.joyActive);
                runAI(p2, p1);
                
                if (GAME.state === 'PLAYING') {
                    checkCollisions(); // Don't allow multiple hits during freeze frame
                }
                
                if(p1 && p2) {
                    const midX = (p1.pos.x + p2.pos.x) / 2; 
                    const midY = (p1.pos.y + p2.pos.y) / 2;
                    camera.position.lerp(new THREE.Vector3(midX * 0.3, Math.max(14, midY + 8), 60), 0.1);
                    targetLookAt.set(camera.position.x, Math.max(10, midY + 2), 0);
                }
            }
            
            currentLookAt.lerp(targetLookAt, 0.1);
            camera.lookAt(currentLookAt);

            updateParticles();
            renderer.render(scene, camera);

            if (GAME.state === 'PLAYING' || GAME.state === 'ROUND_OVER') {
                updateHUD();
            }
        }

        setupMenuCars();
        animate();

    </script>
</body>
